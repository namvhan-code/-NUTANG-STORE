<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOMNAO STORE Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #D1B9FF 0%, #ECE5FF 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .btn-kbank { background-color: #A8DEE1; }
        .btn-wallet { background-color: #FEB9CE; }
        .btn-note { background-color: #FEECC2; }
    </style>
</head>
<body class="flex flex-col items-center py-6 px-4 text-gray-800">

    <div id="toast" class="fixed bottom-8 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity duration-300 z-50">
        คัดลอกสำเร็จ!
    </div>

    <div class="max-w-[420px] w-full space-y-5">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">ร้านลอมเนา</h1>
        </div>

        <div class="glass-card rounded-[40px] p-6 shadow-xl">
            <div class="rounded-[28px] overflow-hidden mb-6 border-4 border-white">
                <img src="https://placehold.co/600x600/ECE5FF/gray?text=LOMNAO+STORE" alt="Store" class="w-full h-auto">
            </div>

            <div class="space-y-4">
                <p class="text-center font-bold">ชื่อบัญชี: อนงค์นุช เพชรสงเคราะห์ เท่านั้น‼️</p>

                <div class="btn-kbank p-4 rounded-2xl cursor-pointer hover:opacity-90 transition" onclick="copyText('165-374-8740')">
                    <p class="text-xs font-bold opacity-70">KBank</p>
                    <p class="text-lg font-bold">165-374-8740</p>
                </div>

                <div class="btn-wallet p-4 rounded-2xl cursor-pointer hover:opacity-90 transition" onclick="copyText('096-793-6500')">
                    <p class="text-xs font-bold opacity-70">TrueMoney Wallet</p>
                    <p class="text-lg font-bold">096-793-6500</p>
                </div>

                <div class="btn-note p-4 rounded-2xl cursor-pointer hover:opacity-90 transition" onclick="copyText('ซื้อขายกับร้านลมหนาว')">
                    <p class="text-xs font-bold opacity-70">จิ้มเพื่อคัดลอก Note</p>
                    <p class="text-md font-medium">"ซื้อขายกับร้านลมหนาว"</p>
                </div>

                <div class="bg-white/50 p-4 rounded-2xl text-sm border border-pink-200">
                    <p class="font-bold text-red-500">สำคัญ‼️</p>
                    <p>โอน Wallet บวกเพิ่ม +1 บาทนะคะ</p>
                </div>

                <a href="https://www.facebook.com/share/p/1X4GtQGKK2/?mibextid=wwXIfr" 
                   class="block text-center py-3 btn-note rounded-2xl font-bold hover:opacity-90 transition">
                    เช็ค ꒰ ᴄʀᴇᴅɪᴛ ꒱ ◌ ּ֯
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => { toast.classList.remove('opacity-100'); toast.classList.add('opacity-0'); }, 2000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTANG STORE Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #D1B9FF; /* แก้ไขเป็นสีพื้นหลังนอก */
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: #ECE5FF; /* แก้ไขเป็นสีพื้นหลังใน */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .virtual-card:hover {
            transform: translateY(-4px);
        }
        .virtual-card:active {
            transform: translateY(2px) scale(0.98);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kbank: '#A8DEE1',
                        kbank_light: '#D6EDF0',
                        wallet: '#FEB9CE',
                        wallet_light: '#FEDEE9',
                        note: '#FEECC2',
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">
        คัดลอกข้อมูลแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <div class="text-center pt-2 pb-2 relative">
            <h1 class="text-2xl font-bold text-gray-800">NUTANG STORE</h1>
            <p class="text-sm font-medium text-gray-600 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-6 relative z-10">
            
            <div class="relative p-2 rounded-[36px] z-10">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden relative border-[4px] border-white">
                    <img src="⭐️⭐️.png" alt="Profile" class="w-full h-auto object-cover">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <p class="font-bold text-gray-800">ชื่อบัญชี วนิดา ขอมุ่งกลาง เท่านั้น‼️</p>
                </div>

                <div class="virtual-card bg-kbank rounded-[24px] p-5 cursor-pointer border-2 border-kbank_light" onclick="copyText('195-190-2590', this)">
                    <div class="text-gray-800 font-bold">KBank</div>
                    <div class="text-2xl font-bold tracking-widest mt-1">195-190-2590</div>
                </div>

                <div class="virtual-card bg-wallet rounded-[24px] p-5 cursor-pointer border-2 border-wallet_light" onclick="copyText('080-447-7228', this)">
                    <div class="text-gray-800 font-bold">TrueMoney</div>
                    <div class="text-2xl font-bold tracking-widest mt-1">080-447-7228</div>
                </div>

                <div class="bg-note p-4 rounded-2xl text-sm font-medium text-gray-700">
                    สำคัญ‼️ เฉพาะคนโอน Wallet รบกวนบวกเพิ่ม +2 บาทนะคะ<br>
                    <span class="text-xs text-gray-500">(ค่าธรรมเนียมแอปสูง)</span>
                </div>

                <a href="https://www.facebook.com/share/p/1X4GtQGKK2/?mibextid=wwXIfr" target="_blank" class="block w-full text-center bg-white p-3 rounded-2xl font-bold text-gray-800 shadow-sm border border-gray-100">
                    ꒰ ᴄʀᴇᴅɪᴛ ꒱ ◌ ּ֯
                </a>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, element) {
            navigator.clipboard.writeText(text);
            showToast();
        }
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
        }
    </script>
</body>
</html>

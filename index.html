<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #D1B9FF; }
        .glass { background-color: #ECE5FF; backdrop-filter: blur(10px); }
        .btn-copy { transition: all 0.2s; }
        .btn-copy:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-sm rounded-3xl p-6 shadow-2xl border-4 border-white">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">NUTANG STORE</h1>
            <p class="text-pink-500 font-semibold">Payment & Checkout</p>
        </div>

        <div class="mb-6">
            <img src="⭐️⭐️.png" alt="Shop Logo" class="w-24 h-24 mx-auto rounded-full border-4 border-white shadow-lg">
        </div>

        <div class="space-y-4">
            <p class="text-center text-sm font-bold text-gray-700 bg-white/50 p-2 rounded-xl">ชื่อบัญชี: วนิดา ขอมุ่งกลาง</p>

            <div class="bg-[#A8DEE1] p-4 rounded-2xl shadow-md border-b-4 border-[#8bc3c6]">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-gray-800">KBank</span>
                    <button onclick="copy('195-190-2590', this)" class="btn-copy bg-white text-sm px-3 py-1 rounded-full font-semibold">คัดลอก</button>
                </div>
                <p class="text-2xl font-bold mt-2">195-190-2590</p>
            </div>

            <div class="bg-[#FEB9CE] p-4 rounded-2xl shadow-md border-b-4 border-[#e0a3b6]">
                <div class="flex justify-between items-center">
                    <span class="font-bold text-gray-800">TrueMoney</span>
                    <button onclick="copy('080-447-7228', this)" class="btn-copy bg-white text-sm px-3 py-1 rounded-full font-semibold">คัดลอก</button>
                </div>
                <p class="text-2xl font-bold mt-2">080-447-7228</p>
            </div>
        </div>

        <div class="bg-[#FEECC2] mt-6 p-4 rounded-2xl text-xs text-gray-700 leading-relaxed shadow-inner">
            <p class="font-bold text-center mb-1">‼️ สำคัญโปรดอ่าน ‼️</p>
            <p>• โอน Wallet บวกเพิ่ม +2 บาท (ค่าธรรมเนียมสูง)</p>
            <p>• โอนผิด โอนใหม่ ไม่โอนคืนทุกกรณี!</p>
            <p>• เช็คชื่อ-เลขบัญชี ก่อนโอนน้า</p>
        </div>

        <a href="https://www.facebook.com/share/p/1X4GtQGKK2/?mibextid=wwXIfr" 
           class="block mt-6 text-center bg-white py-3 rounded-2xl font-bold hover:bg-gray-50 transition-colors shadow-md border border-gray-200">
           ꒰ ᴄʀᴇᴅɪᴛ ꒱ ◌ ּ֯
        </a>
    </div>

    <script>
        function copy(text, btn) {
            navigator.clipboard.writeText(text);
            const original = btn.innerText;
            btn.innerText = "คัดลอกแล้ว!";
            btn.classList.add("bg-green-400");
            setTimeout(() => {
                btn.innerText = original;
                btn.classList.remove("bg-green-400");
            }, 1500);
        }
    </script>
</body>
</html>
